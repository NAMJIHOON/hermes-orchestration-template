# Hermes workflow: sprint
# 여러 태스크를 묶어 순차 또는 병렬로 처리한다.
# 시작 전 1회 승인, 이후 자동 실행.
#
# 호출:
#   hermes run hermes/workflows/sprint.yaml \
#     --tasks "태스크1,태스크2,태스크3"
#
# 또는 태스크 파일로:
#   hermes run hermes/workflows/sprint.yaml \
#     --tasks-file artifacts/sprint-tasks.md

name: sprint
version: 1.0.0
description: 스프린트/에픽 단위 묶음 처리 — 단일 승인 후 자동 실행

defaults:
  worker: claude-code
  worker_mode: print
  max_turns_per_task: 20
  timeout_seconds: 300
  retry_on_error: 1

budget:
  total_iterations: 60
  total_usd: 2.00

inputs:
  - name: tasks
    type: list
    description: 쉼표로 구분된 태스크 목록
    required: true
  - name: context
    type: file
    path: CLAUDE.md
    required: false

# 시작 전 1회 사용자 승인
pre_run:
  approval_required: true
  approval_message: |
    다음 {{ tasks | length }}개 태스크를 실행합니다:
    {% for t in tasks %}
    - {{ t.description }} → {{ t.skill }}
    {% endfor %}
    예상 비용: ${{ estimated_usd }} / 예상 시간: {{ estimated_minutes }}분
    진행할까요?

# 태스크 자동 분해 및 실행
phases:
  - id: sprint-run
    name: Sprint execution
    tasks: "{{ tasks }}"      # 입력받은 태스크 목록을 그대로 사용

    # 태스크 간 의존성이 없으면 병렬 실행
    parallelism: auto         # hermes가 depends_on 기준으로 자동 판단

    # 각 태스크 템플릿 (태스크 목록의 각 항목에 적용)
    task_template:
      worker: claude-code
      worker_mode: print
      prompt: |
        {{ task.description }}

        컨텍스트:
        - 프로젝트 루트: {{ workdir }}
        - 이전 산출물: {{ previous_outputs | join(', ') }}

        완료 기준:
        - 코드 변경이면 테스트가 통과해야 한다
        - 문서 변경이면 링크가 깨지지 않아야 한다
      outputs:
        - "artifacts/sprint/{{ task.id }}/"

    # 개별 태스크 실패 시 → 나머지는 계속 진행, 실패만 리포트
    on_task_failure:
      action: continue
      report: artifacts/sprint/failures.md

# 완료 리포트
post_run:
  report:
    path: artifacts/sprint/summary.md
    template: |
      # Sprint 완료 리포트
      완료: {{ completed }} / {{ total }}
      실패: {{ failed }}
      소요: {{ elapsed_minutes }}분 / ${{ actual_usd }}

      ## 완료된 태스크
      {% for t in completed_tasks %}
      - [x] {{ t.description }} → {{ t.output_path }}
      {% endfor %}

      {% if failed_tasks %}
      ## 실패한 태스크
      {% for t in failed_tasks %}
      - [ ] {{ t.description }} — {{ t.error }}
      {% endfor %}
      {% endif %}

observability:
  kanban: .hermes-state/kanban.json
  events_log: .hermes-state/events.jsonl
  cost_log: .hermes-state/cost.jsonl
